<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100px;
    display: flex;
    align-items: center;
  }

  .date-tag {
    width: 260px;
    height: 100px;
    background: var(--blue);
    color: #ffffff;
    font-size: 26px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0 999px 999px 0;
  }

  .top-title {
    margin-left: 60px;
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
  }

  .brand-logo {
    position: absolute;
    top: 32px;
    right: 115px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-logo img { height: 40px; width: auto; }
  .brand-logo span {
    font-size: 28px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: 1px;
  }

  .wordmark {
    position: absolute;
    top: 220px;
    left: 152px;
    font-size: 96px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: -2px;
  }

  .subtitle {
    position: absolute;
    top: 372px;
    left: 154px;
    font-size: 30px;
    font-weight: 500;
    color: var(--ink);
  }

  .meta {
    position: absolute;
    bottom: 96px;
    left: 152px;
    right: 115px;
    display: flex;
    align-items: center;
    font-size: 22px;
    color: var(--ink);
  }
  .meta b { font-weight: 700; }
  .meta .sep { margin: 0 26px; color: var(--line); }
  .meta .rule { flex: 1; height: 1px; background: #98a2b3; margin-left: 40px; }
</style>
</head>
<body>
<div class="slide">
  <div class="top-bar">
    <div class="date-tag">2026.07.14</div>
    <div class="top-title">AI 기반 시설물 외관 하자 점검 플랫폼</div>
  </div>

  <div class="brand-logo">
    <img src="../icon/LOGO-removebg.png" alt="HajaCheck logo">
    <span>HAJACHECK</span>
  </div>

  <div class="wordmark">HajaCheck</div>
  <div class="subtitle">착수보고서</div>

  <div class="meta">
    <span>PM &nbsp;<b>김승현</b></span>
    <span class="sep">|</span>
    <span>팀원 &nbsp;<b>김관영·오영석·이은석·허남·유병현·정재봉·황승현</b></span>
    <div class="rule"></div>
  </div>
</div>
</body>
</html>
